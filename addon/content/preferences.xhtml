<vbox
  xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
  xmlns:html="http://www.w3.org/1999/xhtml"
>
  <linkset>
    <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  </linkset>

  <groupbox>
    <label><html:h2 data-l10n-id="pref-title"></html:h2></label>

    <checkbox
      id="zotero-prefpane-__addonRef__-hide-automatic-tags"
      preference="extensions.zotero.__addonRef__.hideAutomaticTags"
      data-l10n-id="pref-enable"
      style="margin-top: 10px"
    />

    <hbox align="center" style="margin-top: 15px">
      <html:label
        for="zotero-prefpane-__addonRef__-input"
        data-l10n-id="pref-input"
        style="margin-right: 10px"
      ></html:label>
      <html:input
        type="text"
        id="zotero-prefpane-__addonRef__-input"
        preference="extensions.zotero.__addonRef__.input"
        disabled="true"
        style="width: 150px; padding: 4px"
      ></html:input>
    </hbox>
  </groupbox>

  <vbox style="margin-top: 25px; border-top: 1px solid #ccc; padding-top: 10px">
    <html:label
      data-l10n-id="pref-help"
      data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
      style="color: #666; font-size: 0.85em"
    ></html:label>
  </vbox>
</vbox>
